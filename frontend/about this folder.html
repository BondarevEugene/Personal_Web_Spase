    <title>папка frontend — это абсолютно новый, современный и технологичный фронтенд твоего портала, написанный на связке React + TypeScript + Vite + Tailwind CSS.

По сути, это полноценное SPA (Single Page Application) приложение, которое должно было прийти на смену текущему файлу index.html. Те файлы компонентов, что ты скидывал чуть раньше (BotBuilder.tsx, ArchitectDashboard.tsx, DraggableBotBuilder.tsx с DnD-китом), лежат именно внутри этой папки (в frontend/src/components/ или аналогичной структуре).

Давай я разложу по полочкам, что это за папка и какова её глобальная анатомия:

📑 Из чего состоит эта папка (Разбор улик):
package.json и package-lock.json — это манифесты Node.js. Они показывают, что проект использует React 19, анимации Framer Motion, иконки Lucide-React и современный сборщик Vite.

tsconfig.json и tsconfig.app.json — файлы строгой типизации TypeScript. Это значит, что код защищен от глупых ошибок JavaScript еще на этапе написания.

tailwind.config.js — конфигурация утилитарных стилей Tailwind, которые создают тот самый глубокий, неоновый киберпанк-интерфейс, который заложен в .tsx файлах.

vite.config.ts — мозг быстрой сборки. Он отвечает за HMR (Hot Module Replacement) — когда ты меняешь код в коде, сайт обновляется в браузере за миллисекунды без перезагрузки страницы.

🗺️ Какая у этой папки структура (Где что искать):
Так как это стандартный проект на Vite, внутри этой папки скрывается следующая архитектура (вложенные папки, о которых ты говорил):

frontend/src/ — главное сердце проекта.

src/config/bot_modules.ts — тот самый полный реестр на 51 модуль (наша матрица), который мы обсуждали.

src/components/ — папка, где лежат твои крутые интерактивные панели:

BotBuilder.tsx — визуальный редактор ботов в виде смартфона с возможностью настройки.

DraggableBotBuilder.tsx — продвинутый Drag-and-Drop конструктор.

ArchitectDashboard.tsx — высокотехнологичный дашборд с графами (ReactFlow) для ИИ-агента и планирования проектов.

CommCenter.tsx — центр мониторинга переписок ботов, логи сделок и CRM.

InsightPanel.tsx — графики бизнес-аналитики и сбора лидов (на базе Recharts).

Sidebar.tsx — боковое кибер-меню для переключения между этими модулями.

🚀 Зачем она нужна и как её запустить в будущем?
Текущий index.html на 960+ строк, в котором мы чинили кнопки — это твой монолитный, рабочий прототип (MVP) на чистом JavaScript. Он удобен для быстрой отладки бэкенда, но визуально ограничен.

Папка frontend — это следующая ступень эволюции OmniFactory. Это модульный, масштабируемый интерфейс уровня реального коммерческого IT-продукта.

Когда ты захочешь запустить именно эту, новую React-версию, тебе понадобится сделать следующее в терминале внутри папки frontend:

Установить Node.js на компьютер (если еще не установлен).

Выполнить команду npm install (чтобы скачались все библиотеки из package.json).

Запустить команду локальной разработки: npm run dev.

В vite.config.ts или через бэкенд настроить проксирование (proxy), чтобы React-приложение слало запросы на твой FastAPI бэкенд (http://127.0.0.1:8088/api/builder/modules и т.д.).

Вердикт: Папку береги и ни в коем случае не удаляй! Это готовый, дорогой и очень красивый визуальный интерфейс для твоего Docker-конструктора ботов, ИИ-агентов и систем аналитики. Ты можешь развивать бэкенд на текущем index.html, а когда логика устоится — полностью переехать на это мощное React-приложение.</title>
