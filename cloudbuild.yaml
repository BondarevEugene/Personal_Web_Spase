steps:
  # 1. Собираем Docker-образ
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'gcr.io/$PROJECT_ID/webfactory', '.']

  # 2. Пушим его в реестр
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/webfactory']

  # 3. Деплоим в Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'webfactory'
      - '--image'
      - 'gcr.io/$PROJECT_ID/webfactory'
      - '--region'
      - 'europe-west3' # Или твой регион (например us-central1)
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'

options:
  logging: CLOUD_LOGGING_ONLY